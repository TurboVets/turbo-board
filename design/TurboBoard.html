document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"position:fixed;left:0;right:0;top:0;height:2px;z-index:90;background:linear-gradient(90deg,#0a3161,#008bff 50%,#0a3161)\"><\u002Fdiv>\n  <div style=\"position:fixed;left:0;right:0;bottom:0;height:2px;z-index:90;background:linear-gradient(90deg,#480919,#b11c3b 50%,#480919)\"><\u002Fdiv>\n  <span style=\"position:fixed;width:8px;height:8px;z-index:91;top:-3px;left:10px;background:#0073ff\"><\u002Fspan>\n  <span style=\"position:fixed;width:8px;height:8px;z-index:91;top:-3px;right:10px;background:#0073ff\"><\u002Fspan>\n  <span style=\"position:fixed;width:8px;height:8px;z-index:91;bottom:-3px;left:10px;background:#b11c3b\"><\u002Fspan>\n  <span style=\"position:fixed;width:8px;height:8px;z-index:91;bottom:-3px;right:10px;background:#b11c3b\"><\u002Fspan>\n\n  <!-- ================= AUTH / REPO SETUP ================= -->\n  <sc-if value=\"{{ isAuth }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Auth / Repo Setup\" style=\"height:100vh;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(1100px 520px at 50% -8%,rgba(0,115,255,.16),transparent 70%)\">\n      <div style=\"position:absolute;top:13%;left:0;right:0;text-align:center;font-family:'Akshar',sans-serif;font-size:12px;letter-spacing:0.22em;color:#6e6e76;text-transform:uppercase\">Beside you. Behind you. After you.<\u002Fdiv>\n      <div style=\"width:452px;background:#1e1e21;border:1px solid #303036;border-radius:8px;padding:36px;box-shadow:0 24px 70px rgba(0,0,0,.6);position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#0a3161,#008bff,#0a3161)\"><\u002Fdiv>\n        <svg width=\"46\" height=\"46\" viewBox=\"0 0 32 32\" style=\"display:block;margin-bottom:20px\"><g fill=\"#0073ff\"><rect x=\"14.5\" y=\"6\" width=\"3\" height=\"20\"><\u002Frect><rect x=\"8\" y=\"9\" width=\"16\" height=\"2.4\"><\u002Frect><rect x=\"6\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"22\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"10.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"18.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"13\" y=\"2\" width=\"6\" height=\"3\"><\u002Frect><\u002Fg><\u002Fsvg>\n        <div style=\"display:flex;gap:8px;margin-bottom:26px\">\n          <div style=\"flex:1;height:3px;background:#0073ff\"><\u002Fdiv>\n          <div style=\"flex:1;height:3px;background:{{ step2Bg }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ authS1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <h2 style=\"font-family:'Akshar',sans-serif;font-size:21px;font-weight:600;letter-spacing:0.06em;margin:0 0 7px;text-transform:uppercase\">TurboBoard<\u002Fh2>\n          <p style=\"color:#a6a6ad;font-size:14px;margin:0 0 26px;line-height:1.55\">Connect GitHub to watch every open PR across your repos in one command surface.<\u002Fp>\n          <button onclick=\"{{ authNext }}\" style=\"width:100%;background:#27272a;border:1px solid #45454c;color:#fff;padding:13px;border-radius:4px;font-weight:600;font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.05em;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:11px\" style-hover=\"border-color:#0073ff;background:#2e2e33\">INSTALL THE TURBOBOARD GITHUB APP<\u002Fbutton>\n          <button onclick=\"{{ authNext }}\" style=\"width:100%;background:transparent;border:1px solid #45454c;color:#fff;padding:13px;border-radius:4px;font-weight:600;font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.05em;display:flex;align-items:center;justify-content:center;gap:10px\" style-hover=\"border-color:#0073ff;background:#2e2e33\">SIGN IN WITH OAUTH (DEVICE FLOW)<\u002Fbutton>\n          <p style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;text-align:center;margin:20px 0 0;line-height:1.7;letter-spacing:0.03em;text-transform:uppercase\">A GitHub App grants per-repo access, higher rate limits and webhooks.<br>Tokens are stored server-side — never in the browser.<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ authS2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <h2 style=\"font-family:'Akshar',sans-serif;font-size:21px;font-weight:600;letter-spacing:0.06em;margin:0 0 7px;text-transform:uppercase\">Watched repos<\u002Fh2>\n          <p style=\"color:#a6a6ad;font-size:14px;margin:0 0 18px;line-height:1.55\">turbovets organization · 6 repositories<\u002Fp>\n          <div style=\"max-height:240px;overflow:auto;border:1px solid #303036;border-radius:8px;margin:0 0 20px\">\n            <sc-for list=\"{{ authRepos }}\" as=\"ar\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ ar.toggle }}\" style=\"display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid #303036;cursor:pointer\" style-hover=\"background:#27272a\">\n                <div style=\"flex:1\">\n                  <b style=\"font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.03em\">turbovets/{{ ar.name }}<\u002Fb>\n                  <small style=\"display:block;color:#a6a6ad;font-size:11px;margin-top:2px\">{{ ar.desc }}<\u002Fsmall>\n                <\u002Fdiv>\n                <div style=\"width:38px;height:21px;border-radius:4px;background:{{ ar.twBg }};position:relative;flex-shrink:0;transition:background .15s\">\n                  <span style=\"position:absolute;width:15px;height:15px;border-radius:2px;background:#ffffff;top:3px;left:{{ ar.twLeft }};transition:left .15s\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ openBoardFromAuth }}\" style=\"width:100%;background:#0073ff;color:#fff;border:none;padding:13px;border-radius:4px;font-weight:600;font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase\" style-hover=\"background:#13acff\">Open PR Board →<\u002Fbutton>\n          <p style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;text-align:center;margin:20px 0 0;letter-spacing:0.03em;text-transform:uppercase\">Change watched repos anytime from settings.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= APP SHELL ================= -->\n  <sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;height:100vh;padding-top:2px\">\n\n      <!-- Left nav rail -->\n      <aside style=\"width:236px;background:#0a0a0b;border-right:1px solid #303036;display:flex;flex-direction:column;flex-shrink:0\">\n        <div style=\"padding:20px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid #303036\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 32 32\" style=\"flex-shrink:0\"><g fill=\"#0073ff\"><rect x=\"14.5\" y=\"6\" width=\"3\" height=\"20\"><\u002Frect><rect x=\"8\" y=\"9\" width=\"16\" height=\"2.4\"><\u002Frect><rect x=\"6\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"22\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"10.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"18.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"13\" y=\"2\" width=\"6\" height=\"3\"><\u002Frect><\u002Fg><\u002Fsvg>\n          <div>\n            <h1 style=\"font-family:'Akshar',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.18em;line-height:1;margin:0\">TURBO<\u002Fh1>\n            <small style=\"display:block;font-size:9px;color:#6e6e76;letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;font-family:'Akshar',sans-serif\">Tether · TurboVets<\u002Fsmall>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <nav style=\"padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow:auto\">\n          <div style=\"font-family:'Akshar',sans-serif;font-size:9px;color:#6e6e76;text-transform:uppercase;letter-spacing:0.12em;padding:12px 10px 6px\">Workspace<\u002Fdiv>\n          <sc-for list=\"{{ navItems }}\" as=\"ni\" hint-placeholder-count=\"4\">\n            <a onclick=\"{{ ni.go }}\" style=\"display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border-left:2px solid {{ ni.bl }};background:{{ ni.bg }};color:{{ ni.color }};opacity:{{ ni.op }}\" style-hover=\"background:#1e1e21;color:#f4f4f6\">\n              <span style=\"width:15px;text-align:center;font-size:13px\">{{ ni.icon }}<\u002Fspan>\n              <span style=\"flex:1\">{{ ni.label }}<\u002Fspan>\n              <sc-if value=\"{{ ni.hasCount }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"font-family:'Akshar',sans-serif;font-size:11px;font-weight:600;padding:0 7px;border-radius:4px;background:{{ ni.countBg }};color:{{ ni.countColor }}\">{{ ni.count }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fa>\n          <\u002Fsc-for>\n          <div style=\"font-family:'Akshar',sans-serif;font-size:9px;color:#6e6e76;text-transform:uppercase;letter-spacing:0.12em;padding:12px 10px 6px\">Watched repos<\u002Fdiv>\n          <sc-for list=\"{{ repoNavs }}\" as=\"rn\" hint-placeholder-count=\"4\">\n            <a onclick=\"{{ rn.toggle }}\" title=\"Click to include / exclude from the board\" style=\"display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border-left:2px solid transparent;color:#a6a6ad;opacity:{{ rn.op }}\" style-hover=\"background:#1e1e21;color:#f4f4f6\">\n              <span style=\"width:15px;text-align:center;font-size:11px;color:{{ rn.color }}\">●<\u002Fspan>\n              <span style=\"flex:1\">{{ rn.name }}<\u002Fspan>\n              <span style=\"font-family:'Akshar',sans-serif;font-size:11px;font-weight:600;padding:0 7px;border-radius:4px;background:#27272a;color:#a6a6ad\">{{ rn.count }}<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fnav>\n        <div style=\"margin-top:auto;padding:14px;border-top:1px solid #303036;display:flex;align-items:center;gap:10px\">\n          <div style=\"width:30px;height:30px;border-radius:4px;background:#0a3161;border:1px solid #0073ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Akshar',sans-serif;color:#cfe3ff;flex-shrink:0\">SN<\u002Fdiv>\n          <div style=\"font-size:12px;min-width:0\">Sang Nguyen<br><small style=\"color:#a6a6ad;font-size:11px\">{{ userEmail }}<\u002Fsmall><\u002Fdiv>\n          <button onclick=\"{{ signOut }}\" title=\"Sign out\" style=\"margin-left:auto;background:none;border:none;color:#6e6e76;font-family:'Akshar',sans-serif;font-size:10px;letter-spacing:0.08em\" style-hover=\"color:#e94a5f\">EXIT<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Faside>\n\n      <!-- Center -->\n      <main style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n        <div style=\"height:58px;border-bottom:1px solid #303036;display:flex;align-items:center;gap:14px;padding:0 22px;background:rgba(20,20,24,.6);flex-shrink:0;backdrop-filter:blur(4px)\">\n          <h2 style=\"font-family:'Akshar',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;margin:0;white-space:nowrap\">{{ topTitle }}<\u002Fh2>\n          <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Search PRs — title, repo, #number\" style=\"flex:1;max-width:440px;background:#18181b;border:1px solid #303036;border-radius:4px;padding:8px 12px;color:#f4f4f6;font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.02em;outline:none\" style-focus=\"border-color:#0073ff;box-shadow:0 0 0 1px rgba(0,115,255,.4)\">\n          <div style=\"flex:1\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px;font-family:'Akshar',sans-serif;font-size:11px;letter-spacing:0.12em;color:#54ae39;text-transform:uppercase;white-space:nowrap\">\n            <span style=\"width:7px;height:7px;background:#54ae39;animation:tbPulse 2s infinite\"><\u002Fspan> Live\n          <\u002Fdiv>\n          <button onclick=\"{{ refresh }}\" style=\"background:transparent;color:#f4f4f6;border:1px solid #45454c;padding:8px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap\" style-hover=\"border-color:#0073ff;color:#0073ff\">{{ refreshLabel }}<\u002Fbutton>\n          <button onclick=\"{{ openFilters }}\" style=\"background:transparent;border:1px solid {{ fBtnBd }};color:{{ fBtnColor }};padding:8px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap\" style-hover=\"border-color:#0073ff;color:#0073ff\">Filters<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;overflow:auto;padding:22px\">\n\n          <!-- ===== PR BOARD ===== -->\n          <sc-if value=\"{{ showBoard }}\" hint-placeholder-val=\"{{ true }}\">\n            <div data-screen-label=\"PR Board\">\n              <sc-if value=\"{{ isError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#480919;border:1px solid #e94a5f;border-radius:8px;padding:12px 16px;margin-bottom:16px\">\n                  <span style=\"font-family:'Akshar',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;color:#fbd0d3;text-transform:uppercase\">✕ Sync failed<\u002Fspan>\n                  <span style=\"font-size:13px;color:#fbd0d3;flex:1\">GitHub API rate limit hit — showing data from the last successful sync, 4 minutes ago.<\u002Fspan>\n                  <button onclick=\"{{ refresh }}\" style=\"background:transparent;border:1px solid #e94a5f;color:#fbd0d3;padding:6px 13px;border-radius:4px;font-family:'Akshar',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase\" style-hover=\"background:#e94a5f;color:#ffffff\">Retry<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid;grid-template-columns:repeat(4,minmax(225px,1fr));gap:14px\">\n                  <sc-for list=\"{{ skelCols }}\" as=\"sk\" hint-placeholder-count=\"4\">\n                    <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;border-top:2px solid #45454c;min-height:200px;padding:10px\">\n                      <div style=\"height:13px;width:60%;background:#27272a;border-radius:4px;margin:6px 4px 16px;animation:tbSkel 1.4s infinite\"><\u002Fdiv>\n                      <sc-for list=\"{{ sk.cards }}\" as=\"sc\" hint-placeholder-count=\"2\">\n                        <div style=\"background:#27272a;border-radius:8px;height:96px;margin-bottom:10px;animation:tbSkel 1.4s infinite\"><\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 20px;text-align:center\">\n                  <svg width=\"44\" height=\"44\" viewBox=\"0 0 32 32\" style=\"opacity:.35;margin-bottom:18px\"><g fill=\"#6e6e76\"><rect x=\"14.5\" y=\"6\" width=\"3\" height=\"20\"><\u002Frect><rect x=\"8\" y=\"9\" width=\"16\" height=\"2.4\"><\u002Frect><rect x=\"6\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"22\" y=\"6\" width=\"4\" height=\"4\"><\u002Frect><rect x=\"10.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"18.5\" y=\"22\" width=\"3\" height=\"3\"><\u002Frect><rect x=\"13\" y=\"2\" width=\"6\" height=\"3\"><\u002Frect><\u002Fg><\u002Fsvg>\n                  <div style=\"font-family:'Akshar',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#a6a6ad\">No open PRs match<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#6e6e76;margin:8px 0 20px;max-width:340px\">Nothing across your watched repos matches the current filters and search.<\u002Fdiv>\n                  <button onclick=\"{{ clearFilters }}\" style=\"background:transparent;color:#f4f4f6;border:1px solid #45454c;padding:8px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase\" style-hover=\"border-color:#0073ff;color:#0073ff\">Reset filters<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ showGrid }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:grid;grid-template-columns:repeat(4,minmax(225px,1fr));gap:14px;align-items:start\">\n                  <sc-for list=\"{{ cols }}\" as=\"col\" hint-placeholder-count=\"4\">\n                    <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;display:flex;flex-direction:column;min-height:200px\">\n                      <div style=\"padding:12px 14px;border-bottom:1px solid #303036;display:flex;align-items:center;gap:9px;border-top:2px solid {{ col.accent }};border-radius:8px 8px 0 0\">\n                        <h3 style=\"font-family:'Akshar',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin:0\">{{ col.label }}<\u002Fh3>\n                        <span style=\"margin-left:auto;font-family:'Akshar',sans-serif;color:#a6a6ad;font-size:13px;font-weight:700\">{{ col.count }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"padding:10px;display:flex;flex-direction:column;gap:10px\">\n                        <sc-if value=\"{{ col.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"padding:14px 6px;font-family:'Akshar',sans-serif;font-size:11px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase;text-align:center\">Nothing here<\u002Fdiv>\n                        <\u002Fsc-if>\n                        <sc-for list=\"{{ col.cards }}\" as=\"card\" hint-placeholder-count=\"2\">\n                          <div onclick=\"{{ card.open }}\" style=\"background:#27272a;border:1px solid {{ card.cardBd }};border-radius:8px;padding:12px;cursor:pointer;transition:border-color .12s,transform .08s\" style-hover=\"border-color:#45454c;transform:translateY(-1px)\">\n                            <div style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#a6a6ad;font-weight:500;display:flex;align-items:center;gap:6px;letter-spacing:0.05em\">\n                              <span style=\"color:{{ card.repoColor }};font-size:9px\">●<\u002Fspan> {{ card.repo }} <span style=\"color:#a6a6ad;font-weight:600\">{{ card.num }}<\u002Fspan>\n                            <\u002Fdiv>\n                            <div style=\"font-size:13px;font-weight:600;margin:7px 0 10px;line-height:1.4\">\n                              <sc-if value=\"{{ card.draft }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;font-family:'Akshar',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:1px 7px;border-radius:4px;background:#27272a;color:#dadadd;border:1px solid rgba(186,187,191,.45);margin-right:6px;vertical-align:1px\">Draft<\u002Fspan><\u002Fsc-if>{{ card.title }}\n                            <\u002Fdiv>\n                            <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap\">\n                              <span style=\"display:inline-flex;align-items:center;gap:5px;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap;background:{{ card.ci.bg }};color:{{ card.ci.tx }};border:1px solid {{ card.ci.bd }}\">{{ card.ci.label }}<\u002Fspan>\n                              <span style=\"display:inline-flex;align-items:center;gap:5px;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap;background:{{ card.rev.bg }};color:{{ card.rev.tx }};border:1px solid {{ card.rev.bd }}\">{{ card.rev.label }}<\u002Fspan>\n                            <\u002Fdiv>\n                            <div style=\"display:flex;align-items:center;gap:7px;margin-top:11px;font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;letter-spacing:0.03em\">\n                              <span style=\"width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:{{ card.avBg }};border:1px solid rgba(255,255,255,.12)\">{{ card.initials }}<\u002Fspan>\n                              {{ card.author }} · {{ card.updated }} · {{ card.comments }}\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== NEEDS ATTENTION ===== -->\n          <sc-if value=\"{{ showAttention }}\" hint-placeholder-val=\"{{ false }}\">\n            <div data-screen-label=\"Needs Attention\" style=\"max-width:880px;margin:0 auto\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n                <span style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase\">Stale after<\u002Fspan>\n                <div style=\"display:flex;background:#27272a;border:1px solid #303036;border-radius:4px;overflow:hidden\">\n                  <sc-for list=\"{{ staleOpts }}\" as=\"so\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ so.set }}\" style=\"padding:6px 11px;font-family:'Akshar',sans-serif;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;border:none;border-right:1px solid #303036;background:{{ so.bg }};color:{{ so.color }}\">{{ so.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <span style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase\">{{ attTotal }} PRs need attention<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ attSections }}\" as=\"sec\" hint-placeholder-count=\"5\">\n                <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;margin-bottom:16px;overflow:hidden\">\n                  <div style=\"padding:11px 14px;border-bottom:1px solid #303036;display:flex;align-items:center;gap:9px;border-top:2px solid {{ sec.accent }};background:#27272a\">\n                    <h3 style=\"font-family:'Akshar',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin:0\">{{ sec.label }}<\u002Fh3>\n                    <span style=\"font-family:'Akshar',sans-serif;font-size:9px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase\">{{ sec.sub }}<\u002Fspan>\n                    <span style=\"margin-left:auto;font-family:'Akshar',sans-serif;color:#a6a6ad;font-size:13px;font-weight:700\">{{ sec.count }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ sec.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"padding:16px 14px;font-family:'Akshar',sans-serif;font-size:11px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase\">Nothing here — all clear<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-for list=\"{{ sec.rows }}\" as=\"row\" hint-placeholder-count=\"2\">\n                    <div onclick=\"{{ row.open }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #303036;cursor:pointer;border-left:3px solid {{ sec.accentDim }}\" style-hover=\"background:#27272a\">\n                      <div style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#a6a6ad;width:128px;flex-shrink:0;display:flex;align-items:center;gap:6px;letter-spacing:0.05em\"><span style=\"color:{{ row.repoColor }};font-size:9px\">●<\u002Fspan> {{ row.repo }}<\u002Fdiv>\n                      <div style=\"flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">\n                        <sc-if value=\"{{ row.draft }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:1px 7px;border-radius:4px;background:#27272a;color:#dadadd;border:1px solid rgba(186,187,191,.45);margin-right:6px;vertical-align:1px\">Draft<\u002Fspan><\u002Fsc-if>{{ row.title }} <span style=\"color:#a6a6ad;font-weight:400;margin-left:4px\">{{ row.num }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:6px;flex-shrink:0\">\n                        <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap;background:{{ row.ci.bg }};color:{{ row.ci.tx }};border:1px solid {{ row.ci.bd }}\">{{ row.ci.label }}<\u002Fspan>\n                        <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap;background:{{ row.rev.bg }};color:{{ row.rev.tx }};border:1px solid {{ row.rev.bd }}\">{{ row.rev.label }}<\u002Fspan>\n                        <span style=\"width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:{{ row.avBg }};border:1px solid rgba(255,255,255,.12)\">{{ row.initials }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-family:'Akshar',sans-serif;font-size:10px;color:#6e6e76;width:42px;text-align:right;flex-shrink:0;letter-spacing:0.03em\">{{ row.updated }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== AI SETTINGS ===== -->\n          <sc-if value=\"{{ showSettings }}\" hint-placeholder-val=\"{{ false }}\">\n            <div data-screen-label=\"AI Settings\" style=\"max-width:580px;margin:0 auto\">\n              <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;margin-bottom:14px;overflow:hidden\">\n                <div style=\"padding:11px 14px;font-family:'Akshar',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid #303036;background:#27272a;display:flex;align-items:center;gap:9px\">\n                  Anthropic API key\n                  <sc-if value=\"{{ hasKeyBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:{{ keyBadge.bg }};color:{{ keyBadge.tx }};border:1px solid {{ keyBadge.bd }}\">{{ keyBadge.label }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"padding:16px\">\n                  <sc-if value=\"{{ keyIsSaved }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:flex;align-items:center;gap:12px\">\n                      <code style=\"flex:1;background:#18181b;border:1px solid #303036;border-radius:4px;padding:10px 12px;font-family:'Akshar',sans-serif;font-size:13px;letter-spacing:0.06em;color:#a6a6ad\">{{ savedKeyMasked }}<\u002Fcode>\n                      <button onclick=\"{{ removeKey }}\" style=\"background:transparent;border:1px solid #b11c3b;color:#fbd0d3;padding:9px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase\" style-hover=\"background:#b11c3b;color:#ffffff\">Remove key<\u002Fbutton>\n                    <\u002Fdiv>\n                    <p style=\"font-size:12px;color:#a6a6ad;margin:12px 0 0\">AI Summary and Draft reply are enabled. The key is encrypted at rest and never sent to GitHub.<\u002Fp>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ keyNotSaved }}\" hint-placeholder-val=\"{{ true }}\">\n                    <p style=\"font-size:13px;color:#a6a6ad;margin:0 0 12px;line-height:1.55\">Paste an Anthropic API key to enable AI Summary and Draft reply. Keys start with <code style=\"background:#18181b;border:1px solid #303036;padding:1px 6px;border-radius:2px;font-family:'Akshar',sans-serif;font-size:12px\">sk-ant-<\u002Fcode>.<\u002Fp>\n                    <div style=\"display:flex;gap:10px\">\n                      <input value=\"{{ keyVal }}\" onchange=\"{{ onKey }}\" placeholder=\"sk-ant-api03-…\" style=\"flex:1;background:#18181b;border:1px solid #303036;border-radius:4px;padding:10px 12px;color:#f4f4f6;font-size:13px;font-family:'Akshar',sans-serif;letter-spacing:0.04em;outline:none\" style-focus=\"border-color:#0073ff;box-shadow:0 0 0 1px rgba(0,115,255,.4)\">\n                      <button onclick=\"{{ validateKey }}\" style=\"background:transparent;color:#f4f4f6;border:1px solid #45454c;padding:9px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap\" style-hover=\"border-color:#0073ff;color:#0073ff\">{{ validateLabel }}<\u002Fbutton>\n                      <button onclick=\"{{ saveKey }}\" style=\"background:{{ saveBg }};color:{{ saveColor }};border:none;padding:9px 15px;border-radius:4px;font-weight:600;font-size:12px;font-family:'Akshar',sans-serif;letter-spacing:0.08em;text-transform:uppercase;cursor:{{ saveCursor }}\">Save<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;padding:15px 16px\">\n                <h4 style=\"font-family:'Akshar',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:#a6a6ad;margin:0 0 10px;font-weight:600\">Billing<\u002Fh4>\n                <p style=\"font-size:13px;color:#a6a6ad;line-height:1.6;margin:0\">AI features call the Anthropic API directly with your key. Token usage for summaries and reply drafts is billed to <b style=\"color:#f4f4f6\">your<\u002Fb> Anthropic account — typically well under $1/month for a team this size. No PR content is stored by TurboBoard.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fmain>\n\n      <!-- Scrim for overlay panel (tablet) -->\n      <sc-if value=\"{{ showScrim }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeRight }}\" style=\"position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:55\"><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== RIGHT COLUMN (detail / filters) ===== -->\n      <sc-if value=\"{{ rightOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <aside style=\"{{ panelStyle }}\">\n          <div style=\"height:58px;border-bottom:1px solid #303036;display:flex;align-items:center;gap:10px;padding:0 16px;background:#27272a;flex-shrink:0\">\n            <span style=\"font-family:'Akshar',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase\">{{ rightTitle }}<\u002Fspan>\n            <span style=\"font-family:'Akshar',sans-serif;font-size:12px;color:#6e6e76;letter-spacing:0.06em\">{{ rightSub }}<\u002Fspan>\n            <button onclick=\"{{ closeRight }}\" style=\"margin-left:auto;background:none;border:1px solid transparent;color:#a6a6ad;font-size:15px;line-height:1;padding:4px 8px;border-radius:4px\" style-hover=\"color:#f4f4f6;border-color:#45454c\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow:auto;padding:16px\">\n\n            <!-- ---- PR DETAIL ---- -->\n            <sc-if value=\"{{ rightIsDetail }}\" hint-placeholder-val=\"{{ false }}\">\n              <div data-screen-label=\"PR Detail\">\n                <div style=\"font-family:'Akshar',sans-serif;font-size:11px;color:#a6a6ad;letter-spacing:0.06em;display:flex;align-items:center;gap:6px\"><span style=\"color:{{ det.repoColor }};font-size:9px\">●<\u002Fspan> turbovets/{{ det.repo }}<\u002Fdiv>\n                <h2 style=\"font-size:18px;font-weight:700;margin:7px 0 12px;letter-spacing:0.01em;line-height:1.35\">{{ det.title }} <span style=\"font-weight:400;color:#a6a6ad\">{{ det.num }}<\u002Fspan><\u002Fh2>\n                <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px\">\n                  <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:{{ det.st.bg }};color:{{ det.st.tx }};border:1px solid {{ det.st.bd }}\">{{ det.st.label }}<\u002Fspan>\n                  <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:{{ det.rev.bg }};color:{{ det.rev.tx }};border:1px solid {{ det.rev.bd }}\">{{ det.rev.label }}<\u002Fspan>\n                  <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:{{ det.ci.bg }};color:{{ det.ci.tx }};border:1px solid {{ det.ci.bd }}\">{{ det.ci.label }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#a6a6ad;display:inline-flex;align-items:center;gap:6px\"><span style=\"width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:{{ det.avBg }}\">{{ det.initials }}<\u002Fspan>{{ det.author }} → <code style=\"background:#27272a;padding:1px 6px;border-radius:2px;font-family:'Akshar',sans-serif;font-size:11px\">main<\u002Fcode><\u002Fspan>\n                <\u002Fdiv>\n\n                <!-- AI Summary -->\n                <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;margin-bottom:14px;overflow:hidden;position:relative\">\n                  <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#0a3161,#13acff,#0a3161)\"><\u002Fdiv>\n                  <div style=\"padding:11px 14px;border-bottom:1px solid #303036;display:flex;align-items:center;gap:9px;background:#27272a\">\n                    <span style=\"display:inline-flex;font-family:'Akshar',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;padding:1px 7px;border-radius:4px;background:#0a3161;color:#b2ebff;border:1px solid #13acff\">AI<\u002Fspan>\n                    <span style=\"font-family:'Akshar',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.1em\">Summary<\u002Fspan>\n                    <button onclick=\"{{ regenSummary }}\" style=\"margin-left:auto;background:none;border:none;color:#6e6e76;font-family:'Akshar',sans-serif;font-size:10px;letter-spacing:0.08em;display:flex;align-items:center;gap:5px\" style-hover=\"color:#13acff\"><span style=\"display:inline-block;animation:{{ regenAnim }}\">↻<\u002Fspan> REGENERATE<\u002Fbutton>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ sumLoading }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"padding:13px 14px;display:flex;flex-direction:column;gap:9px\">\n                      <div style=\"height:11px;width:92%;background:#27272a;border-radius:4px;animation:tbSkel 1.2s infinite\"><\u002Fdiv>\n                      <div style=\"height:11px;width:78%;background:#27272a;border-radius:4px;animation:tbSkel 1.2s infinite\"><\u002Fdiv>\n                      <div style=\"height:11px;width:85%;background:#27272a;border-radius:4px;animation:tbSkel 1.2s infinite\"><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ sumReady }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"padding:12px 14px;display:flex;flex-direction:column;gap:8px\">\n                      <sc-for list=\"{{ det.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex;gap:9px;font-size:13px;line-height:1.5;color:#dadadd\"><span style=\"color:#13acff;flex-shrink:0\">▸<\u002Fspan><span>{{ b.t }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                      <div style=\"font-family:'Akshar',sans-serif;font-size:9px;color:#6e6e76;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px\">Generated from diff + thread · claude-sonnet<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <!-- Checks -->\n                <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;margin-bottom:14px;overflow:hidden\">\n                  <div style=\"padding:11px 14px;font-family:'Akshar',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid #303036;background:#27272a;display:flex;align-items:center;gap:9px\">Checks <span style=\"color:#6e6e76;font-weight:400;letter-spacing:0.06em\">· commit {{ det.sha }}<\u002Fspan><\u002Fdiv>\n                  <sc-for list=\"{{ det.checks }}\" as=\"ck\" hint-placeholder-count=\"4\">\n                    <div style=\"padding:9px 14px;display:flex;align-items:center;gap:11px;font-size:13px;border-bottom:1px solid #303036\">\n                      <span style=\"width:7px;height:7px;background:{{ ck.dot }};flex-shrink:0\"><\u002Fspan>\n                      <span style=\"font-weight:500;font-family:'Akshar',sans-serif;font-size:12px;letter-spacing:0.02em\">{{ ck.name }}<\u002Fspan>\n                      <span style=\"color:#a6a6ad;font-size:10px;font-family:'Akshar',sans-serif;margin-left:auto;letter-spacing:0.05em\">{{ ck.ctx }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <!-- Reviewers / commit / files -->\n                <div style=\"background:#1e1e21;border:1px solid #303036;border-radius:8px;margin-bottom:14px\">\n                  <h4 style=\"font-family:'Akshar',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:#a6a6ad;padding:12px 14px 6px;font-weight:600;margin:0\">Reviewers<\u002Fh4>\n                  <sc-for list=\"{{ det.reviewers }}\" as=\"rv\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;gap:9px;padding:6px 14px;font-size:13px\">\n                      <span style=\"width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:{{ rv.avBg }}\">{{ rv.initials }}<\u002Fspan>\n                      {{ rv.who }}\n                      <span style=\"margin-left:auto;display:inline-flex;font-family:'Akshar',sans-serif;font-size:10px;fo 1', borderLeft: '1px solid #303036', boxShadow: '-30px 0 80px rgba(0,0,0,.55)', display: 'flex', flexDirection: 'column' }\n        : { width: '404px', flexShrink: 0, background: '#1e1e21', borderLeft: '1px solid #303036', display: 'flex', flexDirection: 'column', minWidth: 0 },\n      // detail\n      det,\n      sumLoading: s.sumLoading, sumReady: !s.sumLoading,\n      regenAnim: s.sumLoading ? 'tbSpin 1s linear infinite' : 'none',\n      regenSummary: () => { if (s.sumLoading) return; this.setState({ sumLoading: true }); setTimeout(() => this.setState(st => ({ sumLoading: false, sumVariant: st.sumVariant + 1 })), 900); },\n      commentText: s.commentText, onComment: (e) => this.setState({ commentText: e.target.value }),\n      submitComment: () => {\n        if (!s.commentText.trim() || !selPr) return;\n        this.setState(st => ({ extraComments: { ...st.extraComments, [selPr.n]: [...(st.extraComments[selPr.n] || []), { who: 'Sang', initials: 'SN', avBg: this.AV.Sang, time: 'JUST NOW', body: st.commentText, hasBadge: false, hasCode: false, hasNote: false }] }, commentText: '' }));\n      },\n      approvePR: () => { if (selPr) this.setState(st => ({ prs: st.prs.map(p => p.n === selPr.n ? { ...p, review: 'approved' } : p) })); },\n      requestChangesPR: () => { if (selPr) this.setState(st => ({ prs: st.prs.map(p => p.n === selPr.n ? { ...p, review: 'changes' } : p) })); },\n      // sheet\n      sheetOpen: s.sheetOpen,\n      openSheet: () => this.setState({ sheetOpen: true, sheetIntent: 'nudge', draftText: selPr ? this.draftFor('nudge', selPr) : '', copied: false }),\n      closeSheet: () => this.setState({ sheetOpen: false }),\n      sheetCtx: selPr ? '· ' + selPr.repo + ' #' + selPr.n : '',\n      intents, draftText: s.draftText, onDraft: (e) => this.setState({ draftText: e.target.value }),\n      copyLabel: s.copied ? '✓ Copied' : 'Copy',\n      copyDraft: () => { try { navigator.clipboard.writeText(s.draftText); } catch (err) {} this.setState({ copied: true }); setTimeout(() => this.setState({ copied: false }), 1500); },\n      insertDraft: () => this.setState({ commentText: s.draftText, sheetOpen: false }),\n      // filters\n      fRepoChips, fStatusSeg, fRevChecks, fCiChips, fSortSeg,\n      resetFilters: () => this.setState({ fRepos: { 'mobile-app': true, 'api-gateway': true, 'web-portal': true, 'design-system': true }, fStatus: 'open', fReview: { needs: true, changes: true, approved: true, waiting: true }, fCI: { passing: true, pending: true, failing: true }, fSort: 'updated' }),\n      // settings\n      keyVal: s.aiKey, onKey: (e) => this.setState({ aiKey: e.target.value, keyState: 'none' }),\n      keyIsSaved: s.keyState === 'saved', keyNotSaved: s.keyState !== 'saved',\n      savedKeyMasked: s.savedKey,\n      hasKeyBadge: s.keyState !== 'none', keyBadge: keyBadges[s.keyState] || { label: '', bg: 'transparent', bd: 'transparent', tx: 'transparent' },\n      validateLabel: s.keyState === 'validating' ? 'Checking…' : 'Validate',\n      validateKey: () => {\n        if (!s.aiKey.trim() || s.keyState === 'validating') return;\n        this.setState({ keyState: 'validating' });\n        setTimeout(() => this.setState(st => ({ keyState: st.aiKey.trim().startsWith('sk-ant-') ? 'valid' : 'invalid' })), 800);\n      },\n      saveBg: canSave ? '#0073ff' : '#27272a', saveColor: canSave ? '#ffffff' : '#6e6e76', saveCursor: canSave ? 'pointer' : 'default',\n      saveKey: () => { if (this.state.keyState !== 'valid') return; const k = this.state.aiKey.trim(); this.setState({ keyState: 'saved', savedKey: k.slice(0, 10) + '••••••••••••' + k.slice(-4), aiKey: '' }); },\n      removeKey: () => this.setState({ keyState: 'none', savedKey: '', aiKey: '' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
