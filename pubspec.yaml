name: turbo_board
description: "TurboBoard — a single dashboard to watch all open PRs (and later, issues) across selected GitHub repos."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0"

# Platform note: this app targets DESKTOP (macOS/Windows/Linux), TABLET
# (iPad/Android tablet), and WEB. Phones are not a target form factor.
# Before adding a package, verify it supports all of: macos, windows,
# linux, web, android, ios. Avoid mobile-only plugins (camera/scanner,
# firebase_crashlytics, etc.). This is also why we depend on turbo_core +
# turbo_ui directly instead of the turbo_sdk umbrella (turbo_services and
# turbo_task pull in mobile-only plugins that break desktop/web builds).
dependencies:
  collection: ^1.19.1
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.2
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  hooks_riverpod: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lucide_icons_flutter: ^3.1.6
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.4
  timeago: ^3.7.1
  turbo_core:
    git:
      url: https://github.com/TurboVets/mobile-shared-components.git
      ref: main
      path: packages/turbo_core
  turbo_ui:
    git:
      url: https://github.com/TurboVets/mobile-shared-components.git
      ref: main
      path: packages/turbo_ui
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: 2.10.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mockito: ^5.5.0
  riverpod_generator: 4.0.0+1

flutter:
  uses-material-design: true
