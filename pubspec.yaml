name: turbo_board
description: "TurboBoard — a single dashboard to watch all open PRs (and later, issues) across selected GitHub repos."
publish_to: "none"
version: 0.2.2+7

environment:
  sdk: ">=3.10.0"

# Platform note: this app targets DESKTOP (macOS/Windows/Linux), TABLET
# (iPad/Android tablet), and WEB. Phones are not a target form factor.
# Before adding a package, verify it supports all of: macos, windows,
# linux, web, android, ios. Avoid mobile-only plugins (camera/scanner,
# firebase_crashlytics, etc.). This is also why we depend on turbo_core +
# turbo_ui directly instead of the turbo_sdk umbrella (turbo_services and
# turbo_task pull in mobile-only plugins that break desktop/web builds).
dependencies:
  collection: ^1.19.1
  dio: ^5.9.0
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.2
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  google_fonts: ^8.1.0
  gpt_markdown: ^1.1.7
  hooks_riverpod: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lucide_icons_flutter: ^3.1.6
  package_info_plus: ^8.0.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.4
  timeago: ^3.7.1
  turbo_core:
    git:
      url: https://github.com/TurboVets/mobile-shared-components.git
      ref: main
      path: packages/turbo_core
  turbo_ui:
    git:
      url: https://github.com/TurboVets/mobile-shared-components.git
      ref: main
      path: packages/turbo_ui
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: 2.10.0
  fake_async: ^1.3.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mockito: ^5.5.0
  riverpod_generator: 4.0.0+1

flutter:
  uses-material-design: true
  assets:
    # Bundled so the Linux runner can set the GTK window icon at runtime
    # (Linux has no native icon slot generated by flutter_launcher_icons).
    - assets/icon/app_icon.png
    # Bundled so the "What's new" dialog can read the latest release notes.
    - CHANGELOG.md

# App icons for every platform. Regenerate after changing the source art:
#   dart run flutter_launcher_icons
# (Linux desktop has no icon slot in the tool — see linux/ icon below.)
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: "ic_launcher"
  adaptive_icon_background: "#18181b"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#18181b"
    theme_color: "#0073ff"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
